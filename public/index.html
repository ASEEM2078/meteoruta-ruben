<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MeteoRuta Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f7fb;
}

.topbar {
  background: #0f172a;
  color: white;
  padding: 15px;
  text-align: center;
}

#map {
  height: 70vh;
}

.panel {
  padding: 15px;
}

select, button {
  padding: 10px;
  margin: 5px;
}

.result {
  background: white;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="topbar">
  <h2>MeteoRuta Pro 🌦️</h2>
</div>

<div id="map"></div>

<div class="panel">
  <select id="municipios"></select>
  <button onclick="cargarMeteo()">Consultar tiempo</button>

  <div id="resultado" class="result"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([40.4168, -3.7038], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let municipiosData = [];

async function cargarMunicipios() {
  const res = await fetch('/api/municipios');
  municipiosData = await res.json();

  const select = document.getElementById('municipios');

  municipiosData.forEach(m => {
    let option = document.createElement('option');
    option.value = m.id;
    option.text = m.nombre;
    select.appendChild(option);
  });
}

async function cargarMeteo() {
  const id = document.getElementById('municipios').value;

  const res = await fetch(`/api/prediccion/${id}`);
  const data = await res.json();

  const pred = data[0].prediccion.dia[0];

  document.getElementById('resultado').innerHTML = `
    <b>Estado:</b> ${pred.estadoCielo[0].descripcion}<br>
    <b>Temperatura:</b> ${pred.temperatura[0].value}°C<br>
    <b>Viento:</b> ${pred.viento[0].velocidad} km/h
  `;
}

cargarMunicipios();
</script>

</body>
</html>
